name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject CloudBase Secrets
        run: |
          sed -i "s|const TCB_SECRET_ID = '.*';|const TCB_SECRET_ID = '${{ secrets.TCB_SECRET_ID }}';|" www/index.html
          sed -i "s|const TCB_SECRET_KEY = '.*';|const TCB_SECRET_KEY = '${{ secrets.TCB_SECRET_KEY }}';|" www/index.html
          echo "Secrets injected"

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=${ANDROID_HOME:-$HOME/android-sdk}
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME 2>/dev/null || echo "SDK not found"
          if [ -d "$ANDROID_HOME/cmdline-tools" ]; then
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 || echo "SDK install failed"
          fi
          echo "=== SDK contents ==="
          ls $ANDROID_HOME/

      - name: Debug Capacitor
        run: |
          echo '=== Node version ==='
          node --version
          echo '=== NPM version ==='
          npm --version
          echo '=== Cap doctor ==='
          npx cap doctor || echo 'Cap doctor failed (non-critical)'
          echo '=== ANDROID_HOME ==='
          echo $ANDROID_HOME
          echo '=== JAVA_HOME ==='
          echo $JAVA_HOME

      - name: Add Android platform
        run: npx cap add android || echo 'cap add failed'

      - name: Copy web assets
        run: |
          mkdir -p android/app/src/main/assets/public/
          cp -r www/* android/app/src/main/assets/public/
          echo '=== Copy exit code: $? ==='
          ls -la android/app/src/main/assets/public/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export ANDROID_HOME=${ANDROID_HOME:-$HOME/android-sdk}
          export JAVA_HOME=${JAVA_HOME}
          ./gradlew assembleDebug > ../gradle-build.log 2>&1
          EXIT_CODE=$?
          tail -200 ../gradle-build.log 2>/dev/null || echo "No log file"
          echo "=== EXIT CODE: $EXIT_CODE ==="
          exit $EXIT_CODE

      - name: Upload Gradle logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: gradle-build.log

      - name: Create Release
        if: success()
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          release_name: football-booking v1.0.0
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
