name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject CloudBase Secrets
        run: |
          sed -i "s|const TCB_SECRET_ID = '.*';|const TCB_SECRET_ID = '${{ secrets.TCB_SECRET_ID }}';|" www/index.html
          sed -i "s|const TCB_SECRET_KEY = '.*';|const TCB_SECRET_KEY = '${{ secrets.TCB_SECRET_KEY }}';|" www/index.html
          echo "Secrets injected"

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=${ANDROID_HOME:-$HOME/android-sdk}
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME 2>/dev/null || echo "SDK not found"
          if [ -d "$ANDROID_HOME/cmdline-tools" ]; then
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 || echo "SDK install failed"
          fi
          echo "=== SDK contents ==="
          ls $ANDROID_HOME/

      - name: Debug Capacitor
        run: |
          echo '=== Node version ==='
          node --version
          echo '=== NPM version ==='
          npm --version
          echo '=== Cap doctor ==='
          npx cap doctor || echo 'Cap doctor failed (non-critical)'
          echo '=== ANDROID_HOME ==='
          echo $ANDROID_HOME
          echo '=== JAVA_HOME ==='
          echo $JAVA_HOME

      - name: Add Android platform
        run: npx cap add android || echo 'cap add failed'

      - name: Copy web assets
        run: |
          mkdir -p android/app/src/main/assets/public/
          cp -r www/* android/app/src/main/assets/public/
          echo '=== Copy exit code: $? ==='
          ls -la android/app/src/main/assets/public/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export ANDROID_HOME=${ANDROID_HOME:-$HOME/android-sdk}
          export JAVA_HOME=${JAVA_HOME}
          ./gradlew assembleDebug > ../gradle-build.log 2>&1
          EXIT_CODE=$?
          tail -200 ../gradle-build.log 2>/dev/null || echo "No log file"
          echo "=== EXIT CODE: $EXIT_CODE ==="
          exit $EXIT_CODE

      - name: Upload Gradle logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: gradle-build.log

      - name: Create Release
        if: success()
        id: create_release
        run: |
          # Get latest tag or start at v1.0.0
          LATEST_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('tag_name','v0.9.9')[1:])" 2>/dev/null || echo "0.9.9")
          # Parse version parts
          MAJOR=$(echo $LATEST_TAG | cut -d. -f1)
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_TAG"
          # Copy APK with version name
          cp android/app/build/outputs/apk/debug/app-debug.apk "app-debug-${NEW_TAG}.apk"
          # Create release
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"${NEW_TAG}\",\"name\":\"football-booking ${NEW_TAG}\",\"draft\":false,\"prerelease\":false}"
          # Upload asset
          UPLOAD_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].replace('{?name,label}',''))")
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "${UPLOAD_URL}?name=app-debug-${NEW_TAG}.apk" \
            --data-binary "@app-debug-${NEW_TAG}.apk" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Uploaded:', d.get('name','error'))"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
