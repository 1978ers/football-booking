name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug Capacitor
        run: |
          echo '=== Node version ==='
          node --version
          echo '=== NPM version ==='
          npm --version
          echo '=== Cap doctor ==='
          npx cap doctor || echo 'Cap doctor failed (non-critical)'
          echo '=== ANDROID_HOME ==='
          echo $ANDROID_HOME
          echo '=== JAVA_HOME ==='
          echo $JAVA_HOME

      - name: Add Android platform
        run: npx cap add android || echo 'cap add failed'

      - name: Sync Capacitor
        run: |
          echo '=== Syncing Capacitor ==='
          npx cap sync android
          echo '=== Sync exit code: $? ==='
          echo '=== Android folder ==='
          ls -la android/ || echo 'No android folder'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: football-booking-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
